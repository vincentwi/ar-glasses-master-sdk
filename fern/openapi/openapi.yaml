openapi: 3.1.0
info:
  title: AR Glasses Master SDK
  version: 1.0.0
  description: |
    Unified API for controlling AR glasses across multiple manufacturers.
    Supports XREAL, RayNeo, Rokid, Frame, Meta, Vuzix, Everysight, and more.

    ## Overview
    The AR Glasses Master SDK provides a single, consistent API surface for:
    - **Display** — render text, images, and 3D content on any supported glasses
    - **Sensors** — read IMU, GPS, and environmental data with unified quaternion output
    - **Camera** — capture photos and video from glasses-mounted cameras
    - **Audio** — playback and capture via glasses speakers/microphones
    - **Connectivity** — manage USB HID, BLE GATT, and Wi-Fi connections
    - **Spatial** — 3DoF/6DoF tracking, SLAM, and world-anchored content

  contact:
    name: AR Glasses Master SDK
    url: https://github.com/vincentwi/ar-glasses-master-sdk
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local SDK bridge server
  - url: https://api.arglasses.dev
    description: Cloud relay (future)

tags:
  - name: Connection
    description: Device discovery, pairing, and lifecycle management
  - name: Display
    description: Rendering text, images, and overlays on glasses displays
  - name: Sensors
    description: IMU, accelerometer, gyroscope, and sensor fusion data
  - name: Camera
    description: Photo/video capture from glasses-mounted cameras
  - name: Audio
    description: Speaker playback and microphone capture
  - name: Spatial
    description: 6DoF tracking, SLAM, anchors, and world-locked content
  - name: Device
    description: Device information, battery, firmware, and capabilities

paths:
  /devices:
    get:
      operationId: listDevices
      tags: [Connection]
      summary: List available AR glasses
      description: Discovers all connected or nearby AR glasses via USB HID and BLE scanning.
      parameters:
        - name: transport
          in: query
          schema:
            type: string
            enum: [usb, ble, all]
            default: all
          description: Filter by transport type
        - name: timeout_ms
          in: query
          schema:
            type: integer
            default: 5000
          description: Discovery timeout in milliseconds
      responses:
        '200':
          description: List of discovered devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'
              example:
                - id: "xreal-air2-001"
                  type: XREAL_AIR_2_ULTRA
                  displayName: "XREAL Air 2 Ultra"
                  transport: usb
                  connected: true
                  battery: 85

  /devices/{deviceId}/connect:
    post:
      operationId: connectDevice
      tags: [Connection]
      summary: Connect to an AR glasses device
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                timeout_ms:
                  type: integer
                  default: 10000
                auto_reconnect:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Connection established
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionStatus'
        '404':
          description: Device not found
        '409':
          description: Device already connected

  /devices/{deviceId}/disconnect:
    post:
      operationId: disconnectDevice
      tags: [Connection]
      summary: Disconnect from a device
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Disconnected successfully

  /devices/{deviceId}/info:
    get:
      operationId: getDeviceInfo
      tags: [Device]
      summary: Get device information and capabilities
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Device details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceInfo'

  /devices/{deviceId}/display:
    post:
      operationId: displayContent
      tags: [Display]
      summary: Render content on glasses display
      description: |
        Send text, images, or overlay content to the connected glasses display.
        Supports REPLACE (clear + write) and APPEND (add to existing) modes.
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisplayRequest'
      responses:
        '200':
          description: Content displayed
        '400':
          description: Invalid display request
        '422':
          description: Device does not have a display

  /devices/{deviceId}/display/clear:
    post:
      operationId: clearDisplay
      tags: [Display]
      summary: Clear the glasses display
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Display cleared

  /devices/{deviceId}/sensors/imu:
    get:
      operationId: getImuData
      tags: [Sensors]
      summary: Get current IMU sensor reading
      description: |
        Returns the latest fused sensor data including quaternion orientation,
        linear acceleration, and angular velocity. Update rate depends on device
        (60Hz–1000Hz).
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Current IMU data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImuData'

  /devices/{deviceId}/sensors/imu/stream:
    get:
      operationId: streamImu
      tags: [Sensors]
      summary: Stream IMU data via Server-Sent Events
      parameters:
        - $ref: '#/components/parameters/DeviceId'
        - name: rate_hz
          in: query
          schema:
            type: integer
            default: 60
          description: Target sample rate in Hz
      responses:
        '200':
          description: SSE stream of IMU data
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ImuData'

  /devices/{deviceId}/camera/capture:
    post:
      operationId: capturePhoto
      tags: [Camera]
      summary: Capture a photo from glasses camera
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resolution:
                  type: string
                  enum: [low, medium, high, max]
                  default: high
                format:
                  type: string
                  enum: [jpeg, png]
                  default: jpeg
      responses:
        '200':
          description: Photo captured
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '422':
          description: Device does not have a camera

  /devices/{deviceId}/audio/play:
    post:
      operationId: playAudio
      tags: [Audio]
      summary: Play audio through glasses speakers
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                  description: Text-to-speech content
                volume:
                  type: number
                  minimum: 0
                  maximum: 1
                  default: 0.7
      responses:
        '200':
          description: Audio playback started
        '422':
          description: Device does not have speakers

  /devices/{deviceId}/spatial/pose:
    get:
      operationId: getSpatialPose
      tags: [Spatial]
      summary: Get current 6DoF spatial pose
      description: |
        Returns the full 6DoF pose (position + orientation) if the device supports SLAM.
        Falls back to 3DoF (orientation only) for devices without spatial tracking.
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Current spatial pose
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpatialPose'

  /devices/{deviceId}/spatial/anchors:
    post:
      operationId: createAnchor
      tags: [Spatial]
      summary: Create a world-locked spatial anchor
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnchorRequest'
      responses:
        '201':
          description: Anchor created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Anchor'
        '422':
          description: Device does not support SLAM

components:
  parameters:
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
      description: Unique device identifier (e.g. "xreal-air2-001")

  schemas:
    Device:
      type: object
      required: [id, type, displayName, transport, connected]
      properties:
        id:
          type: string
          example: "xreal-air2-001"
        type:
          $ref: '#/components/schemas/DeviceType'
        displayName:
          type: string
          example: "XREAL Air 2 Ultra"
        transport:
          type: string
          enum: [usb, ble, wifi]
        connected:
          type: boolean
        battery:
          type: integer
          minimum: 0
          maximum: 100
          description: Battery percentage (null if tethered)

    DeviceType:
      type: string
      enum:
        - XREAL_AIR
        - XREAL_AIR_2
        - XREAL_AIR_2_PRO
        - XREAL_AIR_2_ULTRA
        - XREAL_ONE
        - XREAL_ONE_PRO
        - RAYNEO_X3_PRO
        - RAYNEO_LUMA
        - ROKID_MAX
        - FRAME
        - META_RAYBAN
        - OMI
        - VUZIX_BLADE_2
        - EVERYSIGHT_MAVERICK
      description: Supported AR glasses device types

    DeviceInfo:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/DeviceType'
        firmware:
          type: string
        serial:
          type: string
        capabilities:
          $ref: '#/components/schemas/Capabilities'
        usb_vid:
          type: string
          description: USB Vendor ID (hex)
        usb_pid:
          type: string
          description: USB Product ID (hex)

    Capabilities:
      type: object
      properties:
        display:
          type: boolean
        camera:
          type: boolean
        microphone:
          type: boolean
        speaker:
          type: boolean
        imu:
          type: boolean
        slam:
          type: boolean
        gps:
          type: boolean
        maxDoF:
          type: integer
          enum: [3, 6]
        imuRateHz:
          type: integer
          description: Maximum IMU sample rate
        displayResolution:
          type: string
          example: "1920x1080"

    ConnectionStatus:
      type: object
      properties:
        deviceId:
          type: string
        status:
          type: string
          enum: [connected, connecting, disconnected, error]
        transport:
          type: string
          enum: [usb, ble, wifi]
        latencyMs:
          type: number

    DisplayRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: Text or HTML content to display
        mode:
          type: string
          enum: [replace, append, overlay]
          default: replace
        position:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
        fontSize:
          type: integer
          default: 16
        color:
          type: string
          default: "#FFFFFF"
        duration_ms:
          type: integer
          description: Auto-clear after N milliseconds (0 = persistent)

    ImuData:
      type: object
      properties:
        timestamp:
          type: integer
          format: int64
          description: Microsecond timestamp
        quaternion:
          type: object
          description: Orientation as unit quaternion (Hamilton convention)
          properties:
            w:
              type: number
            x:
              type: number
            y:
              type: number
            z:
              type: number
        acceleration:
          type: object
          description: Linear acceleration in m/s² (gravity removed)
          properties:
            x:
              type: number
            y:
              type: number
            z:
              type: number
        gyroscope:
          type: object
          description: Angular velocity in rad/s
          properties:
            x:
              type: number
            y:
              type: number
            z:
              type: number
        temperature:
          type: number
          description: IMU temperature in °C

    SpatialPose:
      type: object
      properties:
        timestamp:
          type: integer
          format: int64
        position:
          type: object
          description: Position in meters (world space)
          properties:
            x:
              type: number
            y:
              type: number
            z:
              type: number
        orientation:
          type: object
          description: Orientation quaternion
          properties:
            w:
              type: number
            x:
              type: number
            y:
              type: number
            z:
              type: number
        dof:
          type: integer
          enum: [3, 6]
        confidence:
          type: number
          minimum: 0
          maximum: 1

    AnchorRequest:
      type: object
      required: [label]
      properties:
        label:
          type: string
        position:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
            z:
              type: number
        persistent:
          type: boolean
          default: false

    Anchor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        position:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
            z:
              type: number
        createdAt:
          type: string
          format: date-time
        persistent:
          type: boolean
