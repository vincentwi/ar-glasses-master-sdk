            application/json:
              schema:
                type: object
      parameters:
      - name: quality
        in: query
        description: JPEG quality 0-100
        required: false
        schema:
          type: integer
      - name: targetWidth
        in: query
        description: Target width
        required: false
        schema:
          type: integer
      - name: targetHeight
        in: query
        description: Target height
        required: false
        schema:
          type: integer
      - name: timeoutMs
