openapi: 3.1.0
info:
  title: AR Glasses Master SDK API
  description: 'Comprehensive REST-like documentation API for the AR Glasses Master SDK. Covers 27+ repositories, 500+ functions
    across 12 domains: Display, IMU, Camera, Audio, BLE, Gesture, Spatial Computing, ML/AI, GPS, Device Management, StardustXR
    3D, and Geo/Maps Intelligence.'
  version: 1.0.0
  contact:
    name: AR Glasses SDK Team
    url: https://github.com/AugmentOS
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
- url: https://api.ar-glasses-sdk.dev/api/v1
  description: AR Glasses SDK Documentation API
- url: http://localhost:3000/api/v1
  description: Local development server
tags:
- name: display
  description: Display & Rendering APIs — text display, bitmap rendering, HUD menus, binocular stereo, curved monitors
- name: imu
  description: IMU & Head Tracking (Sensor Fusion) — AHRS, quaternion math, bias estimation, Kalman filtering
- name: camera
  description: Camera & Computer Vision — photo capture, SLAM cameras, frame processing
- name: audio
  description: Audio & Speech — TTS, microphone capture, transcription, audio sync
- name: ble
  description: BLE & Wireless Communication — Bluetooth LE, Wi-Fi P2P, WebSocket transport
- name: gesture
  description: Gesture & Input — tap detection, keyboard, gaze input, hand tracking, ring input
- name: spatial
  description: Spatial Computing (SLAM, Anchors, OpenXR) — XR sessions, reference spaces, plane detection
- name: ml
  description: ML/AI On-Device — TFLite Micro, SAM3 segmentation, Groq LLM, on-device inference
- name: gps
  description: GPS & Geolocation — location access, GPS IPC
- name: device
  description: Device Management & Connectivity — connection lifecycle, device drivers, config, plugins
- name: stardust
  description: 3D Environment (StardustXR) — spatial nodes, drawables, fields, panels, Wayland integration
- name: geo
  description: Geo/Maps Intelligence — Overpass OSM queries, Gemini Maps grounding, health data
paths:
  /api/v1/display/xg-glass-sdk/GlassesClient.display:
    get:
      operationId: display_xg_glass_sdk_GlassesClient_display
      summary: Display text on AR glasses
      description: |-
        Display text on the connected AR glasses. Abstracts vendor-specific display APIs behind a unified interface.

        Rokid: CxrApi openCustomView/updateCustomView with JSON layout, throttled at 350ms.
        Frame: Sends via BLE to frame.display.text().
        Meta: UNSUPPORTED.
        Simulator: Launches SimDisplayActivity.
      tags:
      - display
      responses:
        '200':
          description: Result<Unit> — Success or failure with GlassesError
          content:
            application/json:
              schema:
                type: object
      parameters:
      - name: text
        in: query
        description: Text content to display
        required: true
        schema:
          type: string
      - name: mode
        in: query
        description: REPLACE or APPEND
        required: false
        schema:
          type: string
      - name: force
        in: query
        description: Bypass throttling/dedup
        required: false
        schema:
          type: boolean
  /api/v1/display/xg-glass-sdk/RokidDisplayController.showText:
    get:
      operationId: display_xg_glass_sdk_RokidDisplayController_showText
      summary: Rokid-specific text display with throttling
      description: Internal display controller for Rokid glasses. Uses CxrApi openCustomView() for first display, updateCustomView()
        for updates. Tracks lastText to skip duplicate renders. 350ms minimum throttle interval.
      tags:
      - display
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
      parameters:
      - name: text
        in: query
        description: Text to display
        required: true
        schema:
          type: string
      - name: force
        in: query
        description: Bypass 350ms throttle
        required: false
        schema:
          type: boolean
