components:
  schemas:
    FusionVector:
      type: object
      description: 3D vector used for IMU sensor data (accelerometer, gyroscope, magnetometer).
      properties:
        x:
          type: number
          format: float
        y:
          type: number
          format: float
        z:
          type: number
          format: float
    FusionQuaternion:
      type: object
      description: Quaternion orientation representation {w, x, y, z}.
      properties:
        w:
          type: number
          format: float
        x:
          type: number
          format: float
        y:
          type: number
          format: float
        z:
          type: number
          format: float
    FusionEuler:
      type: object
      description: 'Euler angle orientation: roll, pitch, yaw in degrees.'
      properties:
        roll:
          type: number
          format: float
        pitch:
          type: number
          format: float
        yaw:
          type: number
          format: float
    FusionMatrix:
      type: object
      description: 3x3 rotation matrix.
      properties:
        elements:
          type: array
          items:
            type: number
          minItems: 9
          maxItems: 9
    FusionAhrsSettings:
      type: object
      description: AHRS algorithm configuration.
      properties:
        convention:
          type: string
          enum:
          - NWU
          - ENU
          - NED
        gain:
          type: number
          format: float
          description: Filter gain (0 = gyro only)
        gyroscopeRange:
          type: number
          format: float
          description: Max degrees per second
        accelerationRejection:
          type: number
          format: float
        magneticRejection:
          type: number
          format: float
        recoveryTriggerPeriod:
          type: integer
    FusionAhrs:
      type: object
      description: AHRS (Attitude and Heading Reference System) state structure.
      properties:
        quaternion:
          $ref: '#/components/schemas/FusionQuaternion'
        settings:
          $ref: '#/components/schemas/FusionAhrsSettings'
    FusionBiasSettings:
      type: object
      properties:
        sampleRate:
          type: number
        stationaryThreshold:
          type: number
        stationaryPeriod:
          type: number
    FusionAhrsInternalStates:
      type: object
      properties:
        accelerationError:
          type: number
        accelerometerIgnored:
          type: boolean
        magneticError:
          type: number
        magnetometerIgnored:
          type: boolean
    FusionAhrsFlags:
      type: object
      properties:
        startup:
          type: boolean
        angularRateRecovery:
          type: boolean
        accelerationRecovery:
          type: boolean
        magneticRecovery:
          type: boolean
    XRDeviceInfo:
      type: object
      description: XR device properties from XRLinuxDriver.
      properties:
        brand:
          type: string
        model:
          type: string
        hid_vendor_id:
          type: integer
        hid_product_id:
          type: integer
        resolution_w:
          type: integer
        resolution_h:
          type: integer
        fov:
          type: number
          description: Diagonal FOV degrees
        lens_distance_ratio:
          type: number
        calibration_wait_s:
          type: integer
        imu_cycles_per_s:
          type: integer
        imu_buffer_size:
          type: integer
        look_ahead_constant:
          type: number
        sbs_mode_supported:
          type: boolean
        provides_orientation:
          type: boolean
        provides_position:
          type: boolean
    IMUData:
      type: object
      description: IMU sensor reading with orientation and acceleration.
      properties:
        orientation:
          $ref: '#/components/schemas/FusionQuaternion'
        euler:
          $ref: '#/components/schemas/FusionEuler'
        linearAcceleration:
          $ref: '#/components/schemas/FusionVector'
        timestamp_ms:
          type: number
    SensorData:
      type: object
      description: Raw sensor reading from AR glasses IMU.
      properties:
        gyroscope:
          $ref: '#/components/schemas/FusionVector'
        accelerometer:
          $ref: '#/components/schemas/FusionVector'
        magnetometer:
          $ref: '#/components/schemas/FusionVector'
        timestamp:
          type: number
    GlassesClient:
      type: object
      description: Universal glasses client interface (xg-glass-sdk).
      properties:
        model:
          type: string
          enum:
          - FRAME
          - META
          - ROKID
          - RAYNEO
          - SIMULATOR
          - OMI
        capabilities:
          $ref: '#/components/schemas/DeviceCapabilities'
        state:
          type: string
          enum:
          - Disconnected
          - Connecting
          - Connected
          - Error
    DeviceCapabilities:
      type: object
      description: Device feature capabilities.
      properties:
        canCapturePhoto:
          type: boolean
          default: true
        canDisplayText:
          type: boolean
          default: true
        canRecordAudio:
          type: boolean
          default: false
        canPlayTts:
          type: boolean
          default: false
        canPlayAudioBytes:
          type: boolean
          default: false
        supportsTapEvents:
          type: boolean
          default: false
        supportsStreamingTextUpdates:
          type: boolean
          default: false
    DeviceConfig:
      type: object
      description: XR driver configuration.
      properties:
        disabled:
          type: boolean
        display_fov:
          type: number
        lens_distance_ratio:
          type: number
        display_res:
          type: array
          items:
            type: number
    DisplayOptions:
      type: object
      properties:
        mode:
          type: string
          enum:
          - REPLACE
          - APPEND
        force:
          type: boolean
          default: false
    CaptureOptions:
      type: object
      properties:
        quality:
          type: integer
          minimum: 0
          maximum: 100
        targetWidth:
          type: integer
        targetHeight:
          type: integer
        timeoutMs:
          type: integer
          default: 30000
    CapturedImage:
      type: object
      properties:
        jpegBytes:
          type: string
          format: byte
        timestampMs:
          type: integer
        width:
          type: integer
        height:
          type: integer
        rotationDegrees:
          type: integer
        sourceModel:
          type: string
    AudioSource:
      type: object
      description: Audio source — TTS text or raw bytes.
      oneOf:
      - type: object
        properties:
          type:
            const: tts
          text:
            type: string
      - type: object
        properties:
          type:
            const: raw
          data:
            type: string
            format: byte
          pcmFormat:
            $ref: '#/components/schemas/PcmFormat'
    PcmFormat:
      type: object
      properties:
        sampleRateHz:
          type: integer
          default: 16000
        channelCount:
          type: integer
          default: 1
        encoding:
          type: string
          enum:
          - PCM_S16_LE
          - PCM_S8
          - OPUS
          - MP3
    AudioChunk:
      type: object
      properties:
        bytes:
          type: string
          format: byte
        format:
          $ref: '#/components/schemas/PcmFormat'
        sequence:
          type: integer
        timestampMs:
          type: integer
        endOfStream:
          type: boolean
    MicrophoneOptions:
      type: object
      properties:
        preferredEncoding:
          type: string
          enum:
          - PCM_S16_LE
          - PCM_S8
          - OPUS
        preferredSampleRateHz:
          type: integer
        preferredChannelCount:
          type: integer
        vendorMode:
          type: string
    PlayAudioOptions:
      type: object
      properties:
        speechRate:
          type: number
        interrupt:
          type: boolean
          default: true
    ConnectionState:
      type: string
      enum:
      - Disconnected
      - Connecting
      - Connected
      - Error
    GlassesError:
      type: object
      properties:
        type:
          type: string
          enum:
          - NotConnected
          - PermissionDenied
          - Busy
          - Timeout
          - Transport
          - Unsupported
        message:
          type: string
        detail:
          type: string
    GlassesEvent:
      type: object
      properties:
        type:
          type: string
          enum:
          - Log
          - Warning
          - Tap
          - AccGyro
          - Magnetometer
          - KeyEvent
          - AmbientLight
          - Vsync
          - ProximityNear
          - ProximityFar
        data:
          type: object
    SlamState:
      type: object
      description: SLAM tracking state from 6DoF devices.
      properties:
        position:
          $ref: '#/components/schemas/FusionVector'
        orientation:
          $ref: '#/components/schemas/FusionQuaternion'
        trackingConfidence:
          type: number
        timestamp_ns:
          type: integer
    TempleAction:
      type: object
      description: Temple button/touchpad action from glasses.
      properties:
        action:
          type: string
          enum:
          - tap
          - double_tap
          - triple_tap
          - swipe_forward
          - swipe_back
        count:
          type: integer
    RingData:
      type: object
      description: Pebble ring sensor/interaction data.
      properties:
        touchPosition:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
        gesture:
          type: string
    GPSData:
      type: object
      description: GPS/location data.
      properties:
        latitude:
          type: number
        longitude:
          type: number
        altitude:
          type: number
        accuracy:
          type: number
        timestamp:
          type: integer
    XRTDevice:
      type: object
      description: Monado XR device with 30+ method pointers.
      properties:
        name:
          type: string
        tracking_origin_type:
          type: string
        provides_orientation:
          type: boolean
        provides_position:
          type: boolean
    XRTCompositor:
      type: object
      description: Monado XR compositor for frame submission.
      properties:
        frame_count:
          type: integer
        predicted_display_time_ns:
          type: integer
    XRTSpace:
      type: object
      description: Monado XR space for spatial tracking.
      properties:
        type:
          type: string
          enum:
          - VIEW
          - LOCAL
          - STAGE
          - LOCAL_FLOOR
          - UNBOUNDED
        pose:
          type: object
    OverpassQuery:
      type: object
      description: Overpass QL query for OpenStreetMap data.
      properties:
        query:
          type: string
          description: Overpass QL or XML query string
        bbox:
          type: string
          description: Bounding box (south,west,north,east)
        timeout:
          type: integer
          default: 25
        outputFormat:
          type: string
          enum:
          - json
          - xml
          - csv
          default: json
    GeminiMapsConfig:
      type: object
      description: Gemini Maps grounding configuration.
      properties:
        model:
          type: string
          default: gemini-3-flash-preview
        latitude:
          type: number
        longitude:
          type: number
        enableWidget:
          type: boolean
          default: true
    StreamConfig:
      type: object
      description: RayDesk streaming configuration.
      properties:
        width:
          type: integer
          default: 1920
        height:
          type: integer
          default: 1080
        fps:
          type: integer
          default: 60
        bitrate:
          type: integer
          default: 20000
        audioEnabled:
          type: boolean
          default: true
    StreamState:
      type: string
      enum:
      - Disconnected
      - Connecting
      - Pairing
      - Streaming
      - Error
    Transform:
      type: object
      description: StardustXR 3D transform (translation, rotation, scale).
      properties:
        translation:
          $ref: '#/components/schemas/FusionVector'
        rotation:
          $ref: '#/components/schemas/FusionQuaternion'
        scale:
          $ref: '#/components/schemas/FusionVector'
    Hand:
      type: object
      description: Full hand skeleton with 26 joints from OpenXR hand tracking.
      properties:
        thumb:
          type: object
        index:
          type: object
        middle:
          type: object
        ring:
          type: object
        little:
          type: object
        palm:
          type: object
        wrist:
          type: object
    AppServerConfig:
      type: object
      properties:
        packageName:
          type: string
        apiKey:
          type: string
        port:
          type: integer
          default: 3000
        cloudUrl:
          type: string
    BookmarkEntry:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        isHome:
          type: boolean
    EnvironmentTheme:
      type: object
      properties:
        name:
          type: string
        skyColor:
          type: integer
        statusRingColor:
          type: integer
        dashboardColor:
          type: integer
        frameColor:
          type: integer
