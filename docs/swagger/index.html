<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Glasses Master SDK — API Reference</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-green: #3fb950;
      --accent-orange: #d29922;
      --accent-red: #f85149;
      --accent-purple: #bc8cff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    }

    .sdk-header {
      background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a1e2e 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .sdk-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .sdk-header h1 .icon {
      font-size: 1.8rem;
    }

    .sdk-header .subtitle {
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    .sdk-header nav {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .sdk-header nav a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      padding: 0.375rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s;
    }

    .sdk-header nav a:hover {
      background: var(--bg-tertiary);
      border-color: var(--accent);
    }

    /* Dark theme overrides for Swagger UI */
    .swagger-ui {
      background: var(--bg-primary) !important;
      color: var(--text-primary) !important;
    }

    .swagger-ui .topbar { display: none !important; }

    .swagger-ui .info {
      margin: 2rem 0 !important;
    }

    .swagger-ui .info .title,
    .swagger-ui .info h1,
    .swagger-ui .info h2,
    .swagger-ui .info h3 {
      color: var(--text-primary) !important;
    }

    .swagger-ui .info .description p,
    .swagger-ui .info .description li {
      color: var(--text-secondary) !important;
    }

    .swagger-ui .info .description h2 {
      color: var(--text-primary) !important;
      border-bottom: 1px solid var(--border) !important;
      padding-bottom: 0.5rem !important;
    }

    .swagger-ui .scheme-container {
      background: var(--bg-secondary) !important;
      box-shadow: none !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      padding: 1rem !important;
    }

    .swagger-ui .opblock-tag {
      color: var(--text-primary) !important;
      border-bottom: 1px solid var(--border) !important;
    }

    .swagger-ui .opblock-tag:hover { background: var(--bg-secondary) !important; }

    .swagger-ui .opblock-tag small { color: var(--text-secondary) !important; }

    .swagger-ui .opblock {
      background: var(--bg-secondary) !important;
      border-color: var(--border) !important;
      border-radius: 8px !important;
      margin-bottom: 0.75rem !important;
      box-shadow: none !important;
    }

    .swagger-ui .opblock .opblock-summary {
      border-color: var(--border) !important;
    }

    .swagger-ui .opblock .opblock-summary-description {
      color: var(--text-secondary) !important;
    }

    .swagger-ui .opblock.opblock-get {
      border-color: rgba(88, 166, 255, 0.3) !important;
    }
    .swagger-ui .opblock.opblock-get .opblock-summary-method {
      background: #1f6feb !important;
    }

    .swagger-ui .opblock.opblock-post {
      border-color: rgba(63, 185, 80, 0.3) !important;
    }
    .swagger-ui .opblock.opblock-post .opblock-summary-method {
      background: #238636 !important;
    }

    .swagger-ui .opblock.opblock-put {
      border-color: rgba(210, 153, 34, 0.3) !important;
    }
    .swagger-ui .opblock.opblock-put .opblock-summary-method {
      background: #9e6a03 !important;
    }

    .swagger-ui .opblock.opblock-delete {
      border-color: rgba(248, 81, 73, 0.3) !important;
    }
    .swagger-ui .opblock.opblock-delete .opblock-summary-method {
      background: #da3633 !important;
    }

    .swagger-ui .opblock-body { background: var(--bg-primary) !important; }

    .swagger-ui .opblock .opblock-section-header {
      background: var(--bg-tertiary) !important;
      border-color: var(--border) !important;
    }

    .swagger-ui .opblock .opblock-section-header h4 {
      color: var(--text-primary) !important;
    }

    .swagger-ui table thead tr td,
    .swagger-ui table thead tr th {
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
    }

    .swagger-ui table tbody tr td {
      color: var(--text-secondary) !important;
      border-color: var(--border) !important;
    }

    .swagger-ui .parameter__name { color: var(--text-primary) !important; }
    .swagger-ui .parameter__type { color: var(--accent) !important; }
    .swagger-ui .parameter__name.required::after { color: var(--accent-red) !important; }

    .swagger-ui .model-title { color: var(--text-primary) !important; }
    .swagger-ui .model { color: var(--text-secondary) !important; }

    .swagger-ui .model-box {
      background: var(--bg-secondary) !important;
      border-radius: 8px !important;
    }

    .swagger-ui section.models {
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
    }

    .swagger-ui section.models h4 { color: var(--text-primary) !important; }

    .swagger-ui .model-container {
      background: var(--bg-secondary) !important;
      border-color: var(--border) !important;
    }

    .swagger-ui .responses-inner h4,
    .swagger-ui .responses-inner h5,
    .swagger-ui .response-col_status {
      color: var(--text-primary) !important;
    }

    .swagger-ui .response-col_description__inner p {
      color: var(--text-secondary) !important;
    }

    .swagger-ui .highlight-code,
    .swagger-ui .microlight {
      background: var(--bg-tertiary) !important;
      color: var(--text-primary) !important;
      border-radius: 6px !important;
      border: 1px solid var(--border) !important;
    }

    .swagger-ui .btn {
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
      background: var(--bg-tertiary) !important;
      border-radius: 6px !important;
    }

    .swagger-ui .btn:hover {
      background: var(--bg-secondary) !important;
      border-color: var(--accent) !important;
    }

    .swagger-ui .btn.execute {
      background: #238636 !important;
      border-color: #238636 !important;
      color: #fff !important;
    }

    .swagger-ui .btn.cancel {
      background: var(--bg-tertiary) !important;
      border-color: var(--accent-red) !important;
    }

    .swagger-ui select {
      background: var(--bg-tertiary) !important;
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
      border-radius: 6px !important;
    }

    .swagger-ui input[type=text],
    .swagger-ui textarea {
      background: var(--bg-tertiary) !important;
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
      border-radius: 6px !important;
    }

    .swagger-ui .opblock-summary-path { color: var(--text-primary) !important; }
    .swagger-ui .opblock-summary-path__deprecated { color: var(--text-secondary) !important; }

    .swagger-ui .loading-container .loading::after {
      color: var(--accent) !important;
    }

    .swagger-ui .response-control-media-type__accept-message {
      color: var(--accent-green) !important;
    }

    .swagger-ui .markdown p,
    .swagger-ui .markdown li,
    .swagger-ui .renderedMarkdown p {
      color: var(--text-secondary) !important;
    }

    .swagger-ui .markdown code,
    .swagger-ui .renderedMarkdown code {
      background: var(--bg-tertiary) !important;
      color: var(--accent) !important;
      padding: 2px 6px !important;
      border-radius: 4px !important;
    }

    .swagger-ui a.nostyle { color: var(--accent) !important; }
    .swagger-ui .prop-type { color: var(--accent-green) !important; }
    .swagger-ui .prop-format { color: var(--text-secondary) !important; }

    .swagger-ui .wrapper { max-width: 1400px; padding: 0 2rem; }

    @media (max-width: 768px) {
      .sdk-header { padding: 1rem; flex-direction: column; align-items: flex-start; }
      .sdk-header h1 { font-size: 1.2rem; }
      .swagger-ui .wrapper { padding: 0 1rem; }
    }
  </style>
</head>
<body>
  <header class="sdk-header">
    <div>
      <h1><span class="icon">🕶️</span> AR Glasses Master SDK — API Reference</h1>
      <p class="subtitle">Unified API for XREAL · RayNeo · Rokid · Frame · Meta · Vuzix · Everysight</p>
    </div>
    <nav>
      <a href="https://github.com/vincentwi/ar-glasses-master-sdk">GitHub</a>
      <a href="https://github.com/vincentwi/ar-glasses-master-sdk/blob/main/docs/MASTER_SDK_REFERENCE.md">SDK Docs</a>
      <a href="https://github.com/vincentwi/ar-glasses-master-sdk/blob/main/docs/CAPABILITIES_MATRIX.md">Device Matrix</a>
    </nav>
  </header>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = () => {
      SwaggerUIBundle({
        url: '../../openapi.yaml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: 'StandaloneLayout',
        defaultModelsExpandDepth: 2,
        defaultModelExpandDepth: 2,
        docExpansion: 'list',
        filter: true,
        showExtensions: true,
        showCommonExtensions: true,
        tryItOutEnabled: false
      });
    };
  </script>
</body>
</html>
