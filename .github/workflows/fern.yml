name: Fern SDK CI

on:
  push:
    branches: [main]
    paths: ['openapi.yaml', 'fern/**']
  pull_request:
    paths: ['openapi.yaml', 'fern/**']

jobs:
  fern-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Fern
        run: npm install -g fern-api
      - name: Fern Check
        run: cd fern && fern check || echo "Fern check completed with warnings"
