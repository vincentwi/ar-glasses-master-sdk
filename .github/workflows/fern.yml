name: Fern SDK CI

on:
  push:
    branches: [main]
    paths:
      - 'openapi.yaml'
      - 'fern/**'
  pull_request:
    branches: [main]
    paths:
      - 'openapi.yaml'
      - 'fern/**'
  workflow_dispatch:

jobs:
  fern-check:
    name: Validate API Definition
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Fern
        run: npm install -g fern-api

      - name: Fern Check
        run: fern check
        working-directory: .

  fern-generate:
    name: Generate TypeScript SDK
    runs-on: ubuntu-latest
    needs: fern-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Fern
        run: npm install -g fern-api

      - name: Generate SDK
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        run: fern generate --group ts-sdk --log-level debug
        working-directory: .
